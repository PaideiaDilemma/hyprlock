#exec-once=hyprctl monitors
exec-once=hyprctl output create headless HEADLESS-1
monitor=HEADLESS-1,1920x1080@60Hz,0x0,1

exec-once=foot
exec-once=hyprlock_tester 2>&1 > /tmp/hyprlock_tester_log && hyprctl dispatch exit

bind=SUPERSHIFT, E, exit,

render {
  ctm_animation=0
  cm_enabled=0
  cm_fs_passthrough=0
}

cursor {
  default_monitor=HEADLESS-1
  use_cpu_buffer=1
}

animations {
  enabled=0
}

decoration {
  shadow {
      enabled=0
    }
  rounding=0
}

xwayland {
  enabled=0
}

misc {
  disable_hyprland_logo=1
  disable_splash_rendering=1
  force_default_wallpaper=0
  key_press_enables_dpms=1
}

debug {
  disable_logs=0
}
