monitor = ,disabled

monitor = Virtual-1,1920x1080@60,auto-right,1
monitor = HEADLESS-1,1920x1080@60,auto-right,1
monitor = HEADLESS-2,1920x1080@60,auto-right,1
monitor = HEADLESS-3,1920x1080@60,auto-right,1
monitor = HEADLESS-4,1920x1080@60,auto-right,1
monitor = HEADLESS-5,1920x1080@60,auto-right,1
monitor = HEADLESS-6,1920x1080@60,auto-right,1

exec-once = hyprctl output create headless HEADLESS-2
exec-once = sleep 1 && lock_tester --binary $(which hyprlock) --config /etc/hyprlock_configs/test1.conf 2>&1 > /tmp/lock_tester_log; echo $? > /tmp/exit_status; hyprctl dispatch exit&

render {
  ctm_animation = 0
  cm_enabled = 0
  cm_fs_passthrough = 0
}

cursor {
  default_monitor = HEADLESS-2
}

animations {
  enabled = 0
}

decoration {
  shadow {
    enabled = 0
  }
}

xwayland {
  enabled = 0
}

misc {
  disable_hyprland_logo = 1
  disable_splash_rendering = 1
  force_default_wallpaper = 0
  key_press_enables_dpms = 1
}

debug {
  disable_logs = 0
}
