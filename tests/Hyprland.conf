animations {
  enabled=0
}

decoration {
  shadow {
      enabled=0
    }
  rounding=0
}

input {
  follow_mouse=1
  kb_layout=eu
  kb_options=caps:swapescape
  mouse_refocus=0
}

misc {
  disable_hyprland_logo=1
  disable_splash_rendering=1
  force_default_wallpaper=0
  key_press_enables_dpms=1
}

bind=SUPERSHIFT, E, exit
exec-once=sleep 1 && ./result/bin/hyprlock_tests
